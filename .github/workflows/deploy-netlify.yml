name: Deploy to Netlify

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify files
        run: |
          echo "Files in repo:"
          ls -la
          echo ""
          echo "Checking for new features in index.html:"
          grep -c "modelSettingsModal" index.html || echo "modelSettingsModal NOT FOUND"
          grep -c "homeBtn" index.html || echo "homeBtn NOT FOUND"

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        with:
          args: deploy --prod --dir=.
